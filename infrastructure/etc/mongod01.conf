processManagement:
  fork: false
net:
  bindIpAll: true
  port: 27017
security:
  authorization: "enabled"
  keyFile: "/run/secrets/mongo_cluster_keyfile"
replication:
  replSetName: "infra-dev0"
setParameter:
  enableLocalhostAuthBypass: false
storage:
  dbPath: "/data/db"
  directoryPerDB: true
  engine: "wiredTiger"
